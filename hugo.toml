baseURL = "https://blogs.techvia.software/"
locale = "en-us"
title = "Techvia Blog"
theme = "PaperMod"
[pagination]
  pagerSize = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Techvia Blog"
  description = "Practical insights on Web Development, Cloud Solutions, and emerging technology — from the team at Techvia, empowering businesses with innovative solutions."
  author = "Techvia"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  disableThemeToggle = false

  [params.assets]
    favicon = "/favicon.ico"
    favicon16x16 = "/favicon.ico"
    favicon32x32 = "/favicon.ico"
    apple_touch_icon = "/favicon.svg"
    safari_pinned_tab = "/favicon.svg"

  [params.homeInfoParams]
    Title = "Techvia Blog"
    Content = "Practical insights on Web Development, Cloud Solutions, Mobile Development, and IT Consulting — from the team at Techvia. We help businesses transform through innovative, scalable technology."

[[params.socialIcons]]
  name = "linkedin"
  url = "https://linkedin.com/company/techvia-software"
[[params.socialIcons]]
  name = "email"
  url = "mailto:info@techvia.software"

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = false

[[menu.main]]
  identifier = "main-site"
  name = "← Techvia"
  url = "https://www.techvia.software/"
  weight = 5
[[menu.main]]
  identifier = "home"
  name = "Home"
  url = "/"
  weight = 10
[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20
[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 30
[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON", "robots"]
