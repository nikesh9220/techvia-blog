baseURL = "https://blogs.techvia.software/"
locale = "en-us"
title = "Techvia Blog"
theme = "PaperMod"
[pagination]
  pagerSize = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Techvia Blog"
  description = "Insights on AI-first development, Angular 18, .NET Core, and Azure DevOps by Nikesh Pandya"
  author = "Nikesh Pandya"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  disableThemeToggle = false

  [params.homeInfoParams]
    Title = "Techvia Blog"
    Content = "AI-first development, Angular 18, .NET Core 8, and Azure — by Nikesh Pandya, founder of Techvia."

[[params.socialIcons]]
  name = "linkedin"
  url = "https://linkedin.com/in/nikeshpandya"
[[params.socialIcons]]
  name = "github"
  url = "https://github.com/nikeshpandya"

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = false

[[menu.main]]
  identifier = "home"
  name = "Home"
  url = "/"
  weight = 10
[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20
[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 30
[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]
